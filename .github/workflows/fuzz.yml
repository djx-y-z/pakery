name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  smoke:
    name: Smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - opaque_deserialize
          - group_decode
          - cpace_flow
          - spake2_flow
          - spake2plus_flow
          - opaque_flow
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Restore corpus
        uses: actions/cache@v6
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      - name: Fuzz 60s
        # Pin the target explicitly: cargo-fuzz installed as a prebuilt
        # (musl-static) binary defaults --target to its own build triple
        # (x86_64-unknown-linux-musl), whose std is not on the gnu runner
        # (E0463: can't find crate for `core`). gnu is the runner's host and
        # the triple the coverage job assumes.
        run: |
          mkdir -p fuzz/corpus/${{ matrix.target }}
          cargo fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} \
            fuzz/corpus/${{ matrix.target }} fuzz/seeds/${{ matrix.target }} \
            -s none -- -max_total_time=60
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
